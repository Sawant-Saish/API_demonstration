<!DOCTYPE html>
<html>
<head>
  <title>API Demo</title>
  <style>
    body{
      font-family: Arial;
      text-align:center;
      margin-top:50px;
    }

    button{
      padding:10px 20px;
      font-size:16px;
      cursor:pointer;
    }

    .user{
      background:#f4f4f4;
      margin:10px auto;
      padding:10px;
      width:300px;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h1>API Demonstration</h1>
<p>Click the button to fetch users from an API</p>

<button onclick="getUsers()">Fetch Users</button>

<div id="users"></div>

<script>

function getUsers(){

  fetch("https://jsonplaceholder.typicode.com/users")
  .then(response => response.json())
  .then(data => {

      const usersDiv = document.getElementById("users");
      usersDiv.innerHTML = "";

      data.forEach(user => {
          usersDiv.innerHTML += `
          <div class="user">
            <h3>${user.name}</h3>
            <p>${user.email}</p>
          </div>
          `;
      });

  })
  .catch(error => {
      console.log("Error:", error);
  });

}

</script>

</body>
</html>
